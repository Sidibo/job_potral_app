{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h3>Jobs</h3>
    <a href="{% url 'add_job' %}" class="btn btn-dark">
        ➕ Add Job
    </a>
</div>

<div class="card p-4 shadow">
<h4>Jobs</h4>

<table class="table table-hover">
<tr><th>Title</th><th>Company</th><th>Action</th></tr>

{% for job in jobs %}
<tr>
<td>{{ job.title }}</td>
<td>{{ job.company }}</td>
<td>
    <a href="{% url 'job_detail' job.id %}" class="btn btn-info btn-sm">Details</a>

    <a href="{% url 'edit_job' job.id %}" class="btn btn-warning btn-sm">Edit</a>

    <a href="{% url 'delete_job' job.id %}" class="btn btn-danger btn-sm"
       onclick="return confirm('Are you sure?')">
       Delete
    </a>
</td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}
