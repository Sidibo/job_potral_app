<!DOCTYPE html>
<html>
<head>
<title>Job Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { display:flex; margin:0; font-family:Segoe UI;}
.sidebar {width:240px;background:#1e293b;color:white;padding:20px;height:100vh;}
.sidebar a {display:block;padding:12px;color:#cbd5e1;text-decoration:none;border-radius:8px;}
.sidebar a:hover {background:#3b82f6;color:white;}
.content {flex:1;padding:30px;background:#f1f5f9;}
.card {border-radius:15px;}
</style>
</head>

<body>

<div class="sidebar">
<h4>💼 Job Portal</h4>
<a href="/">🏠 Dashboard</a>
<a href="/users/">👥 Users</a>
<a href="/jobs/">📄 Jobs</a>
<a href="/applications/">📋 Applications</a>
<a href="/logout/" class="nav-link text-white">
        🚪 Logout
    </a>
</div>

<div class="content">
{% block content %}{% endblock %}
</div>

</body>
</html>
